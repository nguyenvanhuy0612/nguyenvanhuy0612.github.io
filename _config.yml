title: Huy's Notes
description: Tutorials, guides, and notes
url: "https://nguyenvanhuy0612.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Theme
remote_theme: pages-themes/minimal@v0.2.0

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# Collections for organizing content
collections:
  tutorials:
    output: true
    permalink: /tutorials/:title/
  guides:
    output: true
    permalink: /guides/:title/
  notes:
    output: true
    permalink: /notes/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "post"
