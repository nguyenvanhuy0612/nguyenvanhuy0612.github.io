---
layout: default
title: Guides
---

<div class="section-header">
  <h1>Guides</h1>
  <p>Reference guides and how-tos.</p>
</div>

<ul class="post-list">
  {% for item in site.guides %}
  <li>
    <h3><a href="{{ item.url | relative_url }}">{{ item.title }}</a></h3>
    {% if item.description %}<p>{{ item.description }}</p>{% endif %}
  </li>
  {% endfor %}
</ul>
